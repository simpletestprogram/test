<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>List Konsumen</title>
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" />
</head>
<body>
<div class="container-fluid text-center">
    <div><h2>List Konsumen</h2></div>
    <div class="m-2">
        <a class = "h3" th:href="@{/konsumen/tambahkonsumen}">Tambah Konsumen</a>
    </div>

    <div class="m-2">
        <form th:action="@{/search}" method="get">
            <input type="text" name="keyword" th:value="${keyword}"  placeholder="Cari Konsumen" size="50" >
            <button type="submit" class="btn btn-info" >Search</button>
            <button type="submit" class="btn btn-info" >Reset</button>
        </form>
    </div>


    <div th:if="${message}" class="alert alert-success text-center">
        [[${message}]]
    </div>

    <div>
        <table class="table table-bordered">
            <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>Alamat</th>
                    <th>Kota</th>
                    <th>Provinsi</th>
                    <th>Tanggal Registrasi</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
            <th:block th:each="konsumen : ${konsumenList}">
                <tr>
                    <td>[[${konsumen.id}]]</td>
                    <td>[[${konsumen.nama}]]</td>
                    <td>[[${konsumen.alamat}]]</td>
                    <td>[[${konsumen.kota}]]</td>
                    <td>[[${konsumen.provinsi}]]</td>
                    <td>[[${konsumen.tglRegistrasi}]]</td>
                    <td>[[${konsumen.status}]]</td>
                    <td>
                        <a class="h4 mr-3" th:href="@{'konsumen/edit/' + ${konsumen.id}}">Edit</a>
                        <a class="h4" th:href="@{'konsumen/delete/' + ${konsumen.id}}">Delete</a>
                    </td>
                </tr>
            </th:block>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
